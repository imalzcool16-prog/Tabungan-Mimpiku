<!doctype html>
<html lang="id">
  <head>
    <link rel="icon" href="/favicon-new.ico" />
    <link rel="icon" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon.ico" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - Tabungan Mimpiku</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>Tabungan Mimpiku</h1>
          <p class="subtitle">Daftar Akun Baru</p>
        </div>
        <form id="registerForm">
          <div class="form-group">
            <label class="form-label" for="username">Nama Pengguna</label>
            <input
              type="text"
              id="username"
              class="form-input"
              placeholder="Masukkan nama pengguna"
              autocomplete="username"
              required
              minlength="3"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Kata Sandi</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Masukkan kata sandi (min. 6 karakter)"
              autocomplete="new-password"
              required
              minlength="6"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword"
              >Konfirmasi Kata Sandi</label
            >
            <input
              type="password"
              id="confirmPassword"
              class="form-input"
              placeholder="Konfirmasi kata sandi"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary" id="registerBtn">
            Daftar
          </button>
        </form>

        <div class="auth-footer">
          Sudah punya akun? <a href="/login">Masuk disini</a>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/auth.js"></script>
    <script>
      // Check if already logged in
      const token = localStorage.getItem("token");
      if (token) {
        window.location.href = "/dashboard";
      }

      // Register Form Handler
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;
          const registerBtn = document.getElementById("registerBtn");

          // Validation
          if (!username || !password) {
            showToast("error", "Username dan password wajib diisi");
            return;
          }

          if (username.length < 3) {
            showToast("error", "Username minimal 3 karakter");
            return;
          }

          if (password.length < 6) {
            showToast("error", "Password minimal 6 karakter");
            return;
          }

          if (password !== confirmPassword) {
            showToast("error", "Konfirmasi password tidak cocok");
            return;
          }

          // Show loading
          registerBtn.innerHTML = '<div class="spinner"></div>';
          registerBtn.disabled = true;

          try {
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (response.ok) {
              // Save token and user data
              localStorage.setItem("token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));

              showToast("success", "Registrasi berhasil! Mengalihkan...");

              setTimeout(() => {
                window.location.href = "/dashboard";
              }, 1000);
            } else {
              showToast("error", data.message || "Registrasi gagal");
              registerBtn.innerHTML = "Daftar";
              registerBtn.disabled = false;
            }
          } catch (error) {
            console.error("Register error:", error);
            showToast("error", "Terjadi kesalahan. Silakan coba lagi.");
            registerBtn.innerHTML = "Daftar";
            registerBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
